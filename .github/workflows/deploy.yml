name: Test & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test-root
          MYSQL_DATABASE: embuddy_test
          MYSQL_USER: embuddy_test
          MYSQL_PASSWORD: test-pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptest-root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql, mbstring, xml, zip, gd, intl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Copy env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Configure test database
        run: |
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=embuddy_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=embuddy_test/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=test-pass/' .env

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Run tests
        run: php artisan test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: aq.si
          username: h2o
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/embuddy-admin

            # Pull latest
            git pull origin main

            # Rebuild and restart
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            # Wait for healthy
            echo "Waiting for admin panel..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8001 > /dev/null 2>&1; then
                echo "✅ Admin panel is running!"
                exit 0
              fi
              sleep 3
            done
            echo "❌ Admin panel health check failed"
            docker compose logs --tail=30
            exit 1
