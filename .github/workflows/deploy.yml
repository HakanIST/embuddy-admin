name: Test & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test-root
          MYSQL_DATABASE: embuddy_test
          MYSQL_USER: embuddy_test
          MYSQL_PASSWORD: test-pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptest-root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql, mbstring, xml, zip, gd, intl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Configure environment
        run: |
          cat > .env << 'EOF'
          APP_NAME="EmBuddy Admin"
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=embuddy_test
          DB_USERNAME=embuddy_test
          DB_PASSWORD=test-pass
          SESSION_DRIVER=file
          CACHE_STORE=file
          QUEUE_CONNECTION=sync
          EOF
          sed -i 's/^          //' .env
          php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: aq.si
          username: h2o
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # 1. Ensure MySQL is running (don't touch API container)
            cd ~/embuddy-api
            docker compose up -d mysql
            echo "⏳ Waiting for MySQL..."
            for i in $(seq 1 30); do
              if docker exec embuddy-mysql mysqladmin ping -h localhost -u root -pembuddy-root-2026 > /dev/null 2>&1; then
                echo "✅ MySQL ready"
                break
              fi
              sleep 2
            done

            # 2. Deploy admin panel (rebuild only admin container)
            cd ~/embuddy-admin
            git pull origin main
            docker compose up -d --build --force-recreate

            # 3. Run migrations inside container
            docker exec embuddy-admin php artisan migrate --force 2>/dev/null || true

            # 4. Health check
            echo "⏳ Waiting for admin panel..."
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8001/admin/login > /dev/null 2>&1; then
                echo "✅ Admin panel is live at /admin/login"
                exit 0
              fi
              sleep 3
            done
            echo "❌ Admin panel health check failed"
            docker logs embuddy-admin --tail=20
            exit 1
