services:
  admin:
    build: .
    container_name: embuddy-admin
    restart: unless-stopped
    ports:
      - "8001:80"
    environment:
      APP_NAME: "EmBuddy Admin"
      APP_ENV: production
      APP_KEY: "base64:Fb90IYY+LyKVgstmLYhQL1aDAeAwWKZrys5IuMLoxd8="
      APP_DEBUG: "false"
      APP_URL: "http://embuddy-admin.tall.tr"
      DB_CONNECTION: mysql
      DB_HOST: embuddy-mysql
      DB_PORT: 3306
      DB_DATABASE: embuddy
      DB_USERNAME: embuddy
      DB_PASSWORD: embuddy-secret-2026
      SESSION_DRIVER: file
      CACHE_STORE: file
    volumes:
      - admin_storage:/var/www/html/storage
    networks:
      - embuddy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  embuddy-net:
    external: true

volumes:
  admin_storage:
